    .sidebar-divider { height: 1px; background: var(--border2); margin: 8px 20px; }
    .clear-filters-btn { display: none; margin: 4px 20px 12px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; color: var(--text-muted); width: calc(100% - 40px); text-align: center; transition: all 0.15s; }
    .clear-filters-btn:hover { border-color: var(--red); color: var(--red); }
    .clear-filters-btn.visible { display: block; }

    /* Content area */
    .content { flex: 1; min-width: 0; padding: 20px 24px; }
    .content-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }

    .active-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }

    .funder-eic { background: rgba(240,136,62,0.15); color: var(--orange); }
    .funder-horizon { background: rgba(45,212,191,0.15); color: var(--teal); }
    .funder-eit { background: rgba(236,72,153,0.15); color: var(--pink); }
    .funder-eureka { background: rgba(210,153,34,0.15); color: var(--yellow); }
    .funder-erc { background: rgba(163,113,247,0.15); color: var(--purple); }
    .programme-tag { font-size: 10px; color: var(--text-faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }
    .card-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .status-open { background: var(--green); animation: pulse 2.5s infinite; }
    .status-upcoming { background: var(--yellow); }
    .status-closed { background: var(--red); }
    .status-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }

    .s-clean { background: rgba(63,185,80,0.1); color: var(--green); border-color: rgba(63,185,80,0.3); }

    .s-health { background: rgba(248,81,73,0.1); color: #ff7b72; border-color: rgba(248,81,73,0.3); }

    .s-mobility { background: rgba(240,136,62,0.1); color: var(--orange); border-color: rgba(240,136,62,0.3); }
    .s-default { background: var(--surface2); color: var(--text-muted); border-color: var(--border); }
    .card-footer { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 6px 10px; padding-top: 10px; border-top: 1px solid var(--border2); margin-top: auto; }
    .card-footer-left { display: flex; align-items: center; gap: 6px; flex: 1 1 auto; min-width: 0; overflow: hidden; }
    .card-footer-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .amount { font-size: 11px; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
    .amount-gbp { color: var(--green); }
    .amount-eur { color: var(--primary); }
    .amount-rolling { color: var(--text-muted); }

    .apply-link:hover { background: var(--primary-bg); }
    .cordis-link { color: #14b8a6; border-color: rgba(20,184,166,0.2); }
    .cordis-link:hover { background: rgba(20,184,166,0.1); }

    /* Empty state */
    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 80px 24px; color: var(--text-muted); text-align: center; }

    .btn-save.saved { border-color: var(--yellow); color: var(--yellow); background: var(--yellow-bg); }

    /* Saved view */
    .saved-view { display: none; flex: 1; padding: 20px 24px; }
    .saved-view.active { display: block; }
    .main-content { display: flex; flex: 1; }
    .main-content.saved-mode .main { display: none; }
    .main-content.saved-mode .saved-view { display: block; }
    .saved-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .saved-title { font-size: 18px; font-weight: 700; }
    .back-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; transition: all 0.15s; }
    .back-btn:hover { border-color: var(--text-muted); color: var(--text); }

    /* Footer */
    .footer { border-top: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .footer-left { font-size: 12px; color: var(--text-faint); display: flex; flex-direction: column; gap: 2px; }
    .footer-legal { font-size: 11px; color: var(--text-faint); opacity: 0.7; }
    .footer-right a { font-size: 12px; color: var(--text-faint); transition: color 0.15s; }
    .footer-right a:hover { color: var(--text-muted); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

    @media (max-width: 900px) {

      .grant-grid { grid-template-columns: 1fr; }
      .detail-panel { width: 100vw; }
    }
    @media (max-width: 600px) {
      .stats-bar { grid-template-columns: 1fr; }
      .header { padding: 0 14px; }
      .content { padding: 16px 14px; }
    }

<div class="app" id="app">

// ── Helpers ────────────────────────────────────────────────────────────────
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function daysUntil(deadline) {
  if (!deadline || deadline === 'Rolling') return null;
  const d = new Date(deadline); const now = new Date();
  now.setHours(0,0,0,0); d.setHours(0,0,0,0);
  return Math.round((d - now) / 86400000);
}

function fmtDeadline(deadline) {
  if (!deadline || deadline === 'Rolling') return { label:'Rolling', cls:'deadline-rolling' };
  const d = daysUntil(deadline);
  const date = new Date(deadline);
  const label = d < 0 ? 'Closed' : d === 0 ? 'Today' : d === 1 ? '1d left' : d <= 30 ? `${d}d left` :
    date.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'});
  const cls = d < 0 ? 'deadline-urgent' : d <= 14 ? 'deadline-urgent' : d <= 30 ? 'deadline-soon' : 'deadline-ok';
  return { label, cls };
}

function funderClass(f) {
  return {
    'Innovate UK':'funder-iuk','UKRI':'funder-ukri','SBRI':'funder-sbri',
    'Wellcome Trust':'funder-wellcome','EIC Europe':'funder-eic',
    'Horizon Europe':'funder-horizon','EIT Europe':'funder-eit',
    'Eureka':'funder-eureka','ERC':'funder-erc'
  }[f] || 'funder-iuk';
}

function sectorClass(s) {
  if (/\bai\b/i.test(s)) return 's-ai';
  if (/clean|circular|sustainab|environ|maritime|emission|ev\b|electric/i.test(s)) return 's-clean';
  if (/deep tech|quantum|semi|photon|crypto|nano/i.test(s)) return 's-deep';
  if (/health|bio|med|pharma|clinical|genomic|mental/i.test(s)) return 's-health';
  if (/manufactur|robot|automat|material|aerospace|aviation|automotive/i.test(s)) return 's-mfg';
  if (/energy|battery|power|fuel|solar|wind|grid|EV/i.test(s)) return 's-energy';
  if (/agri|food|farm|crop|livestock/i.test(s)) return 's-agri';
  if (/biotech|genomic|synthetic bio/i.test(s)) return 's-bio';
  if (/digital|data|software|cloud|cyber|iot|telecom|5g/i.test(s)) return 's-digital';
  if (/space|satellite|astro/i.test(s)) return 's-space';
  if (/social|soci|policy|humani|arts/i.test(s)) return 's-social';
  if (/mobil|transport|transit|urban/i.test(s)) return 's-mobility';
  return 's-default';
}

// ── State ─────────────────────────────────────────────────────────────────
let activeFilters = { funder:[], status:[], sector:[], type:[], eligibility:[], location:[] };
let searchQuery = '';
let sortMode = 'deadline';
let savedIds = new Set();
let viewMode = 'main'; // 'main' | 'saved'

// ── Filter definitions ─────────────────────────────────────────────────────
const FUNDERS = ['Innovate UK','UKRI','SBRI','Wellcome Trust','EIC Europe','Horizon Europe','EIT Europe','Eureka','ERC'];
const STATUSES = ['Open','Upcoming','Closed'];
const SECTORS = ['AI','Advanced Manufacturing','Agritech','Biotech','Clean Tech','Deep Tech','Digital','Energy','Health','Mobility','Social Sciences'];
const TYPES = ['Grant','Research Grant','Partnership Grant','Fellowship','Contract (SBRI)','Proof of Concept','Equity Investment','Accelerator','Clinical Trial Award','ERC Grant'];
const ELIGIBILITIES = ['SME','Start-up','Business','University','Researcher','Early-career Researcher','Mid-career Researcher','Established Researcher','Any Organisation'];
const LOCATIONS = ['UK','EU + Associated','UK + EU + Associated','LMICs','UK + International'];

function normalise(loc) {
  if (!loc) return '';
  const l = loc.toLowerCase();
  if (l.includes('uk') && (l.includes('eu') || l.includes('associated'))) return 'UK + EU + Associated';
  if (l.includes('uk') && l.includes('international')) return 'UK + International';
  if ((l.includes('eu') || l.includes('associated')) && !l.includes('uk')) return 'EU + Associated';
  if (l.includes('lmic') || l.includes('low-') || l.includes('africa') || l.includes('asia')) return 'LMICs';
  if (l.includes('uk') && !l.includes('eu')) return 'UK';
  return loc;
}

function normElig(e) {
  if (!e) return '';
  const l = e.toLowerCase();
  if (l.includes('early-career') || l.includes('early career')) return 'Early-career Researcher';
  if (l.includes('mid-career') || l.includes('mid career')) return 'Mid-career Researcher';
  if (l.includes('established researcher') || l.includes('senior')) return 'Established Researcher';
  if (l.includes('researcher') && !l.includes('org')) return 'Researcher';
  if (l.includes('start-up') || l.includes('startup')) return 'Start-up';
  if (l.includes('sme')) return 'SME';
  if (l.includes('university') || l.includes('academic')) return 'University';
  if (l.includes('any')) return 'Any Organisation';
  if (l.includes('business') || l.includes('company')) return 'Business';
  return e;
}

function normType(t) {
  if (!t) return 'Grant';
  const l = t.toLowerCase();
  if (l.includes('sbri') || l.includes('contract')) return 'Contract (SBRI)';
  if (l.includes('erc')) return 'ERC Grant';
  if (l.includes('fellowship')) return 'Fellowship';
  if (l.includes('partnership')) return 'Partnership Grant';
  if (l.includes('research grant') || l.includes('research award') || l.includes('award')) return 'Research Grant';
  if (l.includes('proof of concept')) return 'Proof of Concept';
  if (l.includes('equity')) return 'Equity Investment';
  if (l.includes('accelerator')) return 'Accelerator';
  if (l.includes('clinical trial')) return 'Clinical Trial Award';
  return 'Grant';
}

// ── Filtering ──────────────────────────────────────────────────────────────
function filterGrants(grants) {
  return grants.filter(g => {
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      if (![g.title,g.funder,g.programme||'',g.desc,g.sectors.join(' '),g.eligibility,g.location||''].join(' ').toLowerCase().includes(q)) return false;
    }
    if (activeFilters.funder.length && !activeFilters.funder.includes(g.funder)) return false;
    if (activeFilters.status.length && !activeFilters.status.includes(g.status.charAt(0).toUpperCase()+g.status.slice(1))) return false;
    if (activeFilters.sector.length && !activeFilters.sector.some(s => g.sectors.includes(s))) return false;
    if (activeFilters.type.length && !activeFilters.type.includes(normType(g.type))) return false;
    if (activeFilters.eligibility.length && !activeFilters.eligibility.some(e => normElig(g.eligibility).includes(e) || g.eligibility.toLowerCase().includes(e.toLowerCase()))) return false;
    if (activeFilters.location.length && !activeFilters.location.some(l => normalise(g.location) === l)) return false;
    return true;
  });
}

function sortGrants(grants) {
  return [...grants].sort((a,b) => {
    if (sortMode === 'deadline') {
      const da = a.deadline === 'Rolling' ? 9999 : (daysUntil(a.deadline) ?? 9999);
      const db = b.deadline === 'Rolling' ? 9999 : (daysUntil(b.deadline) ?? 9999);
      return da - db;
    }
    if (sortMode === 'amount') return (b.amtVal||0) - (a.amtVal||0);
    if (sortMode === 'funder') return a.funder.localeCompare(b.funder);
    if (sortMode === 'newest') return GRANTS.indexOf(b) - GRANTS.indexOf(a);
    return 0;
  });
}

// ── Count helpers ──────────────────────────────────────────────────────────
function countFor(key, value, currentGrants) {
  // Count across the current filter state, ignoring the filter for this key
  const tempFilters = {...activeFilters, [key]: []};
  const q = searchQuery;
  return GRANTS.filter(g => {
    if (q) {
      const ql = q.toLowerCase();
      if (![g.title,g.funder,g.programme||'',g.desc,g.sectors.join(' '),g.eligibility,g.location||''].join(' ').toLowerCase().includes(ql)) return false;
    }
    if (key !== 'funder' && tempFilters.funder.length && !tempFilters.funder.includes(g.funder)) return false;
    if (key !== 'status' && tempFilters.status.length && !tempFilters.status.includes(g.status.charAt(0).toUpperCase()+g.status.slice(1))) return false;
    if (key !== 'sector' && tempFilters.sector.length && !tempFilters.sector.some(s => g.sectors.includes(s))) return false;
    if (key !== 'type' && tempFilters.type.length && !tempFilters.type.includes(normType(g.type))) return false;
    if (key !== 'eligibility' && tempFilters.eligibility.length && !tempFilters.eligibility.some(e => normElig(g.eligibility).includes(e) || g.eligibility.toLowerCase().includes(e.toLowerCase()))) return false;
    if (key !== 'location' && tempFilters.location.length && !tempFilters.location.some(l => normalise(g.location) === l)) return false;
    // match this specific value
    if (key === 'funder') return g.funder === value;
    if (key === 'status') return (g.status.charAt(0).toUpperCase()+g.status.slice(1)) === value;
    if (key === 'sector') return g.sectors.includes(value);
    if (key === 'type') return normType(g.type) === value;
    if (key === 'eligibility') return normElig(g.eligibility).includes(value) || g.eligibility.toLowerCase().includes(value.toLowerCase());
    if (key === 'location') return normalise(g.location) === value;
    return true;
  }).length;
}

function renderSidebar() {
  const sections = [
    { key:'funder', label:'Funder', options: FUNDERS },
    { key:'status', label:'Status', options: STATUSES },
    { key:'sector', label:'Sector / Industry', options: SECTORS },
    { key:'type', label:'Grant Type', options: TYPES },
    { key:'eligibility', label:'Eligibility', options: ELIGIBILITIES },

    { key:'location', label:'Location', options: LOCATIONS }
  ];
  const hasFilters = Object.values(activeFilters).some(v=>v.length>0);
  let html = '';
  if (hasFilters) html += `<button class="clear-filters-btn visible" id="clearAll">Clear all filters</button>`;
  sections.forEach(sec => {
    const isCollapsed = false;
    html += `<div class="sidebar-section" data-key="${sec.key}">
      <div class="sidebar-section-title${isCollapsed?' collapsed':''}" data-sec="${sec.key}">
        ${sec.label}
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="sidebar-options" id="opts-${sec.key}">`;
    sec.options.forEach(opt => {
      const active = activeFilters[sec.key].includes(opt);
      const cnt = countFor(sec.key, opt, null);
      if (cnt === 0 && !active) return;
      html += `<label class="sidebar-option${active?' active':''}" data-key="${sec.key}" data-val="${esc(opt)}">
        <span class="sidebar-check"></span>
        ${esc(opt)}
        <span class="option-count">${cnt}</span>
      </label>`;
    });
    html += `</div></div><div class="sidebar-divider"></div>`;
  });
  document.getElementById('sidebar').innerHTML = html;
  // Event listeners
  document.querySelectorAll('.sidebar-option').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.key; const val = el.dataset.val;
      const idx = activeFilters[key].indexOf(val);
      if (idx >= 0) activeFilters[key].splice(idx,1); else activeFilters[key].push(val);
      renderAll();
    });
  });
  document.querySelectorAll('.sidebar-section-title').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.sec;
      const opts = document.getElementById('opts-'+key);
      const collapsed = el.classList.toggle('collapsed');
      opts.style.display = collapsed ? 'none' : '';
    });
  });
  const ca = document.getElementById('clearAll');
  if (ca) ca.addEventListener('click', () => { activeFilters = {funder:[],status:[],sector:[],type:[],eligibility:[],location:[]}; renderAll(); });
}

      <h3>No saved grants yet</h3><p>Click the bookmark icon on any grant card to save it here.</p>
    </div>`; return;
  }
  grid.innerHTML = saved.map(cardHtml).join('');
  attachCardListeners(grid);
}

function updateSavedBadge() {
  const cnt = savedIds.size;
  const el = document.getElementById('savedCount');
  el.textContent = cnt;
  el.className = 'saved-count' + (cnt > 0 ? ' has-saved' : '');
}

function renderAll() {
  renderSidebar();
  renderGrid();
  renderActiveChips();
  updateSavedBadge();
  if (viewMode === 'saved') renderSavedGrid();
}

// ── Detail panel ──────────────────────────────────────────────────────────
function openDetail(id) {
  const g = GRANTS.find(g=>g.id===id); if (!g) return;

  const dl = fmtDeadline(g.deadline);
  const amtClass = g.currency === 'eur' ? 'amount-eur' : 'amount-gbp';
  const statusMap = { open:['status-badge-open','Open'], upcoming:['status-badge-upcoming','Upcoming'], closed:['status-badge-closed','Closed'] };
  const [sbCls, sbLabel] = statusMap[g.status] || statusMap.open;

  const panel = document.getElementById('detailPanel');
  panel.innerHTML = `
    <div class="detail-top">
      <div class="detail-close"><button id="closeDetail"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Close</button></div>
      <div class="detail-funder-row"><span class="funder-badge ${funderClass(g.funder)}">${esc(g.funder)}</span>${g.programme?`<span style="font-size:12px;color:var(--text-muted)">/ ${esc(g.programme)}</span>`:''}</div>
      <div class="detail-title">${esc(g.title)}</div>
      <div class="detail-status-row"><span class="status-badge ${sbCls}">${sbLabel}</span><span class="deadline ${dl.cls}" style="font-size:12px;">${dl.label}</span></div>
    </div>
    <div class="detail-body">
      <div class="detail-desc">${esc(g.desc)}</div>
      <div class="detail-rows">
        <div class="detail-row">
          <div class="detail-row-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
          <div><div class="detail-row-label">Funding Amount</div><div class="detail-row-value ${amtClass}">${esc(g.amount||'Contact funder')}</div></div>
        </div>
        <div class="detail-row">
          <div class="detail-row-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
          <div><div class="detail-row-label">Eligibility</div><div class="detail-row-value">${esc(g.eligibility||'See funder website')}</div></div>
        </div>
        <div class="detail-row">
          <div class="detail-row-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
          <div><div class="detail-row-label">Deadline</div><div class="detail-row-value">${g.deadline === 'Rolling' ? 'Rolling / Open Call' : new Date(g.deadline).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div></div>
        </div>
        <div class="detail-row">
          <div class="detail-row-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
          <div><div class="detail-row-label">Location</div><div class="detail-row-value">${esc(g.location||'See funder website')}</div></div>
        </div>
        <div class="detail-row">
          <div class="detail-row-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
          <div><div class="detail-row-label">Grant Type</div><div class="detail-row-value">${esc(g.type||'Grant')}</div></div>
        </div>
      </div>
      ${g.sectors && g.sectors.length ? `
      <div class="trl-label">Sectors</div>
      <div class="detail-sectors">${g.sectors.map(s=>`<span class="sector-tag ${sectorClass(s)}">${esc(s)}</span>`).join('')}</div>`:''}
      ${g.trl ? `
      <div class="detail-trl">

        <div class="trl-range"><span>TRL 1 — Basic research</span><span>TRL 9 — Market</span></div>
      </div>`:''}

    <div class="detail-apply">
      <a href="${esc(g.url)}" target="_blank" rel="noopener noreferrer" class="btn-primary">
        Apply Now <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>
      ${(g.funder === 'Horizon Europe' || g.funder === 'ERC') ? `<a href="https://cordis.europa.eu/search/en?q=${encodeURIComponent(g.title)}" target="_blank" rel="noopener noreferrer" class="btn-secondary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search CORDIS
      </a>` : ''}
      <button class="btn-save${isSaved?' saved':''}" id="detailSave" data-id="${g.id}">

        ${isSaved?'Saved':'Save'}
      </button>
    </div>`;
  document.getElementById('closeDetail').addEventListener('click', closeDetail);
  document.getElementById('detailSave').addEventListener('click', () => { toggleSave(g.id); openDetail(g.id); });
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('detailOverlay').classList.remove('open');
}

function toggleSave(id) {
  if (savedIds.has(id)) savedIds.delete(id); else savedIds.add(id);
  renderAll();
}

function attachCardListeners(container) {
  container.querySelectorAll('.grant-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.save-btn') || e.target.closest('.apply-link')) return;
      openDetail(card.dataset.id);
    });
    card.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); openDetail(card.dataset.id); }});
  });
  container.querySelectorAll('.save-btn').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); toggleSave(btn.dataset.id); });
  });
}

// ── Init ───────────────────────────────────────────────────────────────────
renderStats();
renderAll();

// Search
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value.trim();
  searchClear.className = 'search-clear' + (searchQuery ? ' visible' : '');
  renderAll();
});
searchClear.addEventListener('click', () => {
  searchInput.value = ''; searchQuery = '';
  searchClear.className = 'search-clear';
  
// ── GrantRadar Runtime Guardian ──────────────────────────────────────────────
// Runs before renderAll(). If any check fails, shows an error banner instead
// of silently rendering a blank page.
(function runGuardian() {
  const errors = [];
  const warnings = [];

  // 1. GRANTS array must exist and be non-empty
  if (!Array.isArray(GRANTS) || GRANTS.length === 0) {
    errors.push('GRANTS array is empty or missing');
  }

  if (GRANTS.length > 0) {
    const VALID_STATUSES  = new Set(['open','upcoming','closed']);
    const VALID_SECTORS   = new Set(['AI','Advanced Manufacturing','Agritech','Biotech','Clean Tech','Deep Tech','Digital','Energy','Health','Mobility','Social Sciences']);
    const VALID_CURRENCIES = new Set(['gbp','eur']);
    const REQUIRED = ['id','funder','title','amount','amtVal','currency','status','deadline','eligibility','type','trl','sectors','location','desc','url'];

    for (const g of GRANTS) {
      // 2. Required fields
      for (const f of REQUIRED) {
        if (g[f] === undefined || g[f] === null || g[f] === '') {
          errors.push(`Grant ${g.id||'?'}: missing required field "${f}"`);
        }
      }
      // 3. Status must be exactly open/upcoming/closed
      if (!VALID_STATUSES.has(g.status)) {
        errors.push(`Grant ${g.id}: status="${g.status}" is invalid (must be open/upcoming/closed)`);
      }
      // 4. Sectors must be an array
      if (!Array.isArray(g.sectors) || g.sectors.length === 0) {
        errors.push(`Grant ${g.id}: sectors must be a non-empty array`);
      }
      // 5. Deadline format
      if (g.deadline && g.deadline !== 'Rolling' && g.deadline !== 'TBC') {
        if (!/^\d{4}-\d{2}-\d{2}$/.test(g.deadline)) {
          errors.push(`Grant ${g.id}: deadline "${g.deadline}" is not YYYY-MM-DD format`);
        }
      }
      // 6. amtVal must be number
      if (typeof g.amtVal !== 'number') {
        errors.push(`Grant ${g.id}: amtVal must be a number, got ${typeof g.amtVal}`);
      }
      // 7. trl must be [min, max] array
      if (!Array.isArray(g.trl) || g.trl.length !== 2) {
        errors.push(`Grant ${g.id}: trl must be [min, max] array`);
      }
    }

    // 8. Duplicate IDs
    const idsSeen = {};
    for (const g of GRANTS) { idsSeen[g.id] = (idsSeen[g.id]||0)+1; }
    const dupIds = Object.entries(idsSeen).filter(([,v])=>v>1).map(([k])=>k);
    if (dupIds.length) errors.push(`Duplicate grant IDs: ${dupIds.join(', ')}`);

    // 9. Test cardHtml on first 3 grants to catch rendering crashes early
    try {
      const samples = GRANTS.slice(0, 3);
      for (const g of samples) {
        const html = cardHtml(g);
        if (typeof html !== 'string' || html.length < 50) {
          errors.push(`cardHtml(${g.id}): returned invalid HTML`);
        }
      }
    } catch(e) {
      errors.push(`cardHtml() crashed: ${e.message}`);
    }

    // 10. Test filterGrants
    try {
      const filtered = filterGrants(GRANTS);
      if (filtered.length === 0 && GRANTS.length > 0) {
        errors.push('filterGrants() returned 0 results for unfiltered grants — all grants hidden');
      }
    } catch(e) {
      errors.push(`filterGrants() crashed: ${e.message}`);
    }
  }

  if (errors.length === 0) {
    // All good — proceed normally
    console.log('[GrantRadar Guardian] ✓ All checks passed');
    return;
  }

  // ── Show error banner instead of blank page ────────────────────────────────
  console.error('[GrantRadar Guardian] ERRORS:', errors);

  // Render the stats bar normally (it just uses GRANTS.length, usually works)
  try { renderStats(); } catch(e) {}

  // Replace grant grid with a clear error panel
  const grid = document.getElementById('grantGrid');
  if (grid) {
    grid.innerHTML = `
      <div style="grid-column:1/-1;background:#1a0a0a;border:1px solid #f87171;border-radius:12px;padding:24px 28px;color:#fca5a5;font-family:inherit;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <strong style="font-size:15px;color:#f87171;">Dashboard data error detected</strong>
        </div>
        <p style="font-size:13px;color:#e6edf3;margin-bottom:12px;">
          The GrantRadar guardian caught ${errors.length} issue${errors.length>1?'s':''} that would cause grants not to display.
          The dashboard has been protected from showing a blank page.
        </p>
        <ul style="font-size:12px;color:#fca5a5;margin:0;padding-left:16px;line-height:1.8;">
          ${errors.map(e => `<li>${e}</li>`).join('')}
        </ul>
        <p style="font-size:11px;color:#8b949e;margin-top:14px;">
          This error has been logged to the browser console. The daily refresh will attempt to fix this automatically. 
          If the issue persists, the data file needs manual repair.
        </p>
      </div>`;
  }

  // Stop normal rendering
  throw new Error('[GrantRadar Guardian] Rendering halted — data errors found');
})();

renderAll();
});

// Sort
document.getElementById('sortSelect').addEventListener('change', e => {
  sortMode = e.target.value; renderGrid();
});

// Saved view
document.getElementById('savedBtn').addEventListener('click', () => {
  viewMode = 'saved';
  document.getElementById('mainContent').classList.add('saved-mode');
  renderSavedGrid();
  closeDetail();
});
document.getElementById('backBtn').addEventListener('click', () => {
  viewMode = 'main';
  document.getElementById('mainContent').classList.remove('saved-mode');
});

// Overlay close
document.getElementById('detailOverlay').addEventListener('click', closeDetail);
document.addEventListener('keydown', e => { if (e.key==='Escape') closeDetail(); });
</script>
